
services:
  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: primestack_postgres
    environment:
      POSTGRES_DB: primestack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - primestack_net

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: primestack_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    #ports:
    #  - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - primestack_net

  # ─── MinIO (S3-compatible storage) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: primestack_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: primestack
      MINIO_ROOT_PASSWORD: primestack123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - primestack_net

  # ─── Backend (Go) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primestack_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/primestack?sslmode=disable
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: primestack-media
      APP_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - primestack_net

  # ─── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SITE_URL: https://primestack.uz
        BACKEND_ORIGIN: "http://backend:8080"
    container_name: primestack_frontend
    environment:
      NEXT_PUBLIC_API_URL: ""
      BACKEND_ORIGIN: "http://backend:8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - primestack_net

  # ─── Nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: primestack_nginx
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - primestack_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  primestack_net:
    driver: bridge
